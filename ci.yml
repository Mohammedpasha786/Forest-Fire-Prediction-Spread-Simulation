name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install GDAL system dependency (required by rasterio)
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8 black

      - name: Lint with flake8 (errors only, style warnings ignored)
        run: |
          flake8 src/ run_pipeline.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check formatting with black (non-blocking)
        run: |
          black --check --diff src/ tests/ run_pipeline.py || true

      - name: Run smoke test (quick pipeline)
        run: |
          python run_pipeline.py --quick

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

      - name: Upload smoke-test outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-outputs-py${{ matrix.python-version }}
          path: |
            outputs/maps/*.png
            outputs/animations/*.gif
          retention-days: 7
